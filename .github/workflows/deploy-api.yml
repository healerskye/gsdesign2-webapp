name: Build & Deploy gsDesign2 API

on:
  push:
    branches: [main]
    paths: ["api/**", ".github/workflows/deploy-api.yml"]

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        run: curl -fsSL https://fly.io/install.sh | sh

      - name: Build image
        run: docker build -t gsdesign2-api:local ./api

      - name: Smoke test
        run: |
          docker run --rm gsdesign2-api:local Rscript -e "library(plumber); cat('plumber OK\n')"
          docker run --rm gsdesign2-api:local Rscript -e "library(gsDesign2); cat('gsDesign2 OK\n')"
          docker run --rm gsdesign2-api:local Rscript -e "library(gsDesign); cat('gsDesign OK\n')"

      - name: Check Fly.io machine state
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          STATE=$(flyctl machines list --app gsdesign2-api --json 2>/dev/null | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          if not data: print('none')
          else: print(data[0].get('state','unknown'))" 2>/dev/null || echo "none")
          echo "Machine state: $STATE"
          if [ "$STATE" = "stopped" ] || [ "$STATE" = "failed" ] || [ "$STATE" = "none" ]; then
            echo "Destroying crashed/stopped machines..."
            MACHINES=$(flyctl machines list --app gsdesign2-api --json 2>/dev/null | python3 -c "
            import json,sys
            data=json.load(sys.stdin)
            print(' '.join([m['id'] for m in data]))" 2>/dev/null || echo "")
            for m in $MACHINES; do
              flyctl machines destroy "$m" --app gsdesign2-api --force 2>&1 || true
            done
          else
            echo "Machine is $STATE — will do rolling update"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl deploy \
            --config api/fly.toml \
            --local-only \
            --image gsdesign2-api:local \
            --ha=false \
            --detach \
            2>&1 || true
          echo "Deploy triggered."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
